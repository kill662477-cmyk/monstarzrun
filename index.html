<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MONSTARZ RUN</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  overflow:hidden;background:#050b18;
  touch-action:none;overscroll-behavior:none;
  font-family:Arial,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
}
canvas{
  position:fixed;inset:0;
  width:100vw;height:100vh;
  display:block;background:#07162d;
}
#hud{
  position:fixed;top:14px;left:14px;z-index:10;
  color:white;font-weight:900;
  text-shadow:0 2px 8px rgba(0,0,0,.6);
  pointer-events:none;
}
#score{font-size:22px}
#combo{font-size:16px;color:#ffd95c;opacity:0}
#combo.on{opacity:1}
.overlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(3,8,18,.78);
  color:white;text-align:center;
}
.panel{
  width:min(420px,88vw);
  padding:26px 22px;border-radius:24px;
  background:rgba(10,25,48,.95);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
.panel h1{margin:0 0 12px;font-size:32px}
.panel p{margin:8px 0;color:#cfe6ff;line-height:1.45}
.panel button{
  margin-top:16px;width:100%;height:50px;
  border:0;border-radius:16px;
  background:linear-gradient(135deg,#36d1ff,#7b5cff);
  color:white;font-size:18px;font-weight:900;cursor:pointer;
}
#mobileControls{
  position:fixed;left:0;right:0;bottom:18px;z-index:20;
  display:flex;justify-content:space-between;
  padding:0 20px;pointer-events:none;
}
.ctrlBtn{
  width:84px;height:84px;border-radius:50%;
  border:2px solid rgba(255,255,255,.28);
  background:rgba(14,33,62,.72);
  color:white;font-weight:900;
  pointer-events:auto;user-select:none;
}
@media(min-width:900px){#mobileControls{display:none}}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div id="score">SCORE 0</div>
  <div id="combo">COMBO x1</div>
</div>

<div id="startScreen" class="overlay">
  <div class="panel">
    <h1>MONSTARZ RUN</h1>
    <p>SPACE / 화면 터치 : 점프</p>
    <p>↓ / SLIDE 버튼 : 슬라이드</p>
    <p>별풍선을 먹고 콤보를 이어가라!</p>
    <button id="startBtn" type="button">게임 시작</button>
  </div>
</div>

<div id="gameOverScreen" class="overlay" style="display:none;">
  <div class="panel">
    <h1>GAME OVER</h1>
    <p id="finalScore">SCORE 0</p>
    <button id="restartBtn" type="button">다시 시작</button>
  </div>
</div>

<div id="mobileControls">
  <button class="ctrlBtn" id="jumpBtn" type="button">JUMP</button>
  <button class="ctrlBtn" id="slideBtn" type="button">SLIDE</button>
</div>

<script>
/* =====================
   기본 세팅
===================== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScoreEl = document.getElementById("finalScore");

let W = innerWidth;
let H = innerHeight;
let DPR = Math.min(devicePixelRatio || 1, 2);

function resize(){
  W = innerWidth;
  H = innerHeight;
  DPR = Math.min(devicePixelRatio || 1, 2);
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener("resize", resize);
resize();

/* =====================
   이미지/사운드
===================== */
const imageFiles = {
  player: "assets/player_monstarz_clean.png",
  coin1: "assets/coin_blue.png",
  coin2: "assets/coin_orange.png",
  coin3: "assets/coin_pink.png",
  coin4: "assets/coin_purple.png",
  coin5: "assets/coin_yellow.png"
};

const imgs = {};
Object.keys(imageFiles).forEach(k=>{
  imgs[k] = new Image();
  imgs[k].src = imageFiles[k];
});

const coinKeys = ["coin1","coin2","coin3","coin4","coin5"];

let bgm, sfxJump, sfxCoin, sfxHit, sfxGameover;
let soundReady = false;

function initSound(){
  if(soundReady) return;
  soundReady = true;
  try{
    bgm = new Audio("assets/bgm.mp3");
    bgm.loop = true;
    bgm.volume = 0.35;

    sfxJump = new Audio("assets/jump.wav");
    sfxCoin = new Audio("assets/coin.wav");
    sfxHit = new Audio("assets/hit.wav");
    sfxGameover = new Audio("assets/gameover.wav");

    sfxJump.volume = 0.45;
    sfxCoin.volume = 0.7;
    sfxHit.volume = 0.55;
    sfxGameover.volume = 0.65;

    bgm.play().catch(()=>{});
  }catch(e){}
}

function playSfx(s){
  if(!s) return;
  try{
    s.currentTime = 0;
    s.play().catch(()=>{});
  }catch(e){}
}

/* =====================
   게임 변수
===================== */
let running = false;
let gameOvered = false;
let lastTime = 0;
let rafId = null;

let worldX = 0;
let speed = 360;
let maxSpeed = 610;
let score = 0;
let combo = 1;
let comboTimer = 0;

let coins = [];
let obstacles = [];
let particles = [];

let nextCoinX = 500;
let nextObstacleX = 950;

const player = {
  x: 130,
  y: 0,
  w: 82,
  h: 82,
  vy: 0,
  grounded: false,
  sliding: false,
  jumpCount: 0,
  slideTimer: 0
};

const gravity = 1850;
const jumpPower = -720;

/* =====================
   지형
===================== */
function terrainY(wx){
  const cycle = wx % 2600;
  const base = H * 0.76;

  // 낙사 구간
  if(cycle > 1180 && cycle < 1460) return null;
  if(cycle > 2150 && cycle < 2380) return null;

  // 자연스러운 일체형 경사
  if(cycle < 500) return base;
  if(cycle < 850) return base - (cycle - 500) * 0.18;
  if(cycle < 1180) return base - 63;
  if(cycle < 1750) return base - 25 + Math.sin(cycle * 0.015) * 18;
  if(cycle < 2150) return base + (cycle - 1750) * 0.09;
  return base + 36;
}

function groundAtScreenX(x){
  return terrainY(worldX + x);
}

function isSafeGround(wx){
  return terrainY(wx) !== null &&
         terrainY(wx - 120) !== null &&
         terrainY(wx + 120) !== null;
}

/* =====================
   스폰
===================== */
function spawnCoinLine(wx){
  const gy = terrainY(wx);
  if(gy === null) return;

  for(let i=0;i<5;i++){
    coins.push({
      x: wx + i * 46,
      y: gy - 100 - Math.sin(i * 0.9) * 24,
      r: 17,
      img: coinKeys[Math.floor(Math.random() * coinKeys.length)],
      taken: false
    });
  }
}

function spawnObstacle(wx){
  if(!isSafeGround(wx)) return;

  const gy = terrainY(wx);
  const air = Math.random() > 0.6;

  obstacles.push({
    x: wx,
    y: air ? gy - 96 : gy - 46,
    w: air ? 46 : 42,
    h: air ? 46 : 46,
    air
  });
}

/* =====================
   조작
===================== */
function jump(){
  if(!running || gameOvered) return;

  if(player.grounded || player.jumpCount < 2){
    player.vy = jumpPower;
    player.grounded = false;
    player.jumpCount++;
    player.sliding = false;
    spawnJumpEffect();
    playSfx(sfxJump);
  }
}

function slide(on){
  if(!running || gameOvered) return;

  player.sliding = !!on && player.grounded;
  if(player.sliding){
    player.slideTimer = 0.16;
    spawnSlideEffect();
  }
}

document.addEventListener("keydown", e=>{
  if(e.code === "Space" || e.code === "ArrowUp"){
    e.preventDefault();
    jump();
  }
  if(e.code === "ArrowDown"){
    e.preventDefault();
    slide(true);
  }
});

document.addEventListener("keyup", e=>{
  if(e.code === "ArrowDown"){
    e.preventDefault();
    slide(false);
  }
});

canvas.addEventListener("pointerdown", e=>{
  e.preventDefault();
  if(running) jump();
});

document.getElementById("jumpBtn").addEventListener("pointerdown", e=>{
  e.preventDefault();
  jump();
});

const slideBtn = document.getElementById("slideBtn");
slideBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  slide(true);
});
slideBtn.addEventListener("pointerup", e=>{
  e.preventDefault();
  slide(false);
});
slideBtn.addEventListener("pointercancel", e=>{
  e.preventDefault();
  slide(false);
});

/* =====================
   이펙트
===================== */
function spawnJumpEffect(){
  const gy = groundAtScreenX(player.x + player.w/2) || player.y + player.h;
  for(let i=0;i<12;i++){
    particles.push({
      x: player.x + 35 + Math.random()*25,
      y: gy,
      vx: -100 - Math.random()*170,
      vy: -70 + Math.random()*100,
      life: .35,
      max: .35,
      size: 4 + Math.random()*5,
      type: "dust"
    });
  }
}

function spawnSlideEffect(){
  const gy = groundAtScreenX(player.x + player.w/2) || player.y + player.h;
  for(let i=0;i<10;i++){
    particles.push({
      x: player.x + 18 + Math.random()*45,
      y: gy - 6,
      vx: -130 - Math.random()*220,
      vy: -45 + Math.random()*70,
      life: .22,
      max: .22,
      size: 3 + Math.random()*4,
      type: "spark"
    });
  }
}

function spawnCoinEffect(x,y){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      vx: -90 + Math.random()*180,
      vy: -170 + Math.random()*130,
      life: .38,
      max: .38,
      size: 3 + Math.random()*5,
      type: "coin"
    });
  }
}

/* =====================
   충돌
===================== */
function playerHitCircle(){
  return {
    cx: player.x + player.w * 0.5,
    cy: player.y + player.h * (player.sliding ? 0.65 : 0.5),
    r: player.sliding ? 24 : 31
  };
}

function circleRectCollision(cx,cy,cr,rx,ry,rw,rh){
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx;
  const dy = cy - ny;
  return dx*dx + dy*dy < cr*cr;
}

/* =====================
   업데이트
===================== */
function update(dt){
  if(!running || gameOvered) return;

  dt = Math.min(dt, 1/30);

  speed = Math.min(maxSpeed, speed + 3.5 * dt);
  worldX += speed * dt;

  score += dt * 18 * combo;
  scoreEl.textContent = "SCORE " + Math.floor(score);

  comboTimer -= dt;
  if(comboTimer <= 0){
    combo = 1;
    comboEl.classList.remove("on");
  }

  player.vy += gravity * dt;
  player.y += player.vy * dt;

  const gy = groundAtScreenX(player.x + player.w/2);

  if(gy !== null && player.y + player.h >= gy){
    player.y = gy - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumpCount = 0;
  }else{
    player.grounded = false;
  }

  // 떨어지면 죽음
  if(player.y > H + 120){
    endGame();
    return;
  }

  if(player.slideTimer > 0){
    player.slideTimer -= dt;
    if(player.slideTimer <= 0 && player.sliding){
      spawnSlideEffect();
      player.slideTimer = 0.16;
    }
  }

  if(worldX + W + 250 > nextCoinX){
    spawnCoinLine(nextCoinX);
    nextCoinX += 430 + Math.random()*380;
  }

  if(worldX + W + 350 > nextObstacleX){
    spawnObstacle(nextObstacleX);
    nextObstacleX += 760 + Math.random()*620;
  }

  const hit = playerHitCircle();

  for(const c of coins){
    if(c.taken) continue;
    const sx = c.x - worldX;
    const sy = c.y;
    const dx = hit.cx - sx;
    const dy = hit.cy - sy;

    if(dx*dx + dy*dy < (hit.r + c.r) * (hit.r + c.r)){
      c.taken = true;
      combo++;
      comboTimer = 2.3;
      score += 80 * combo;
      comboEl.textContent = "COMBO x" + combo;
      comboEl.classList.add("on");
      spawnCoinEffect(sx, sy);
      playSfx(sfxCoin);
    }
  }

  for(const o of obstacles){
    const sx = o.x - worldX;
    if(sx < -120) continue;

    if(circleRectCollision(hit.cx, hit.cy, hit.r, sx, o.y, o.w, o.h)){
      playSfx(sfxHit);
      endGame();
      return;
    }
  }

  coins = coins.filter(c => c.x - worldX > -160 && !c.taken);
  obstacles = obstacles.filter(o => o.x - worldX > -180);

  for(const p of particles){
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 320 * dt;
  }
  particles = particles.filter(p => p.life > 0);
}

/* =====================
   그리기
===================== */
function drawBackground(){
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#071630");
  sky.addColorStop(.58,"#0b2445");
  sky.addColorStop(1,"#07111f");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,.75)";
  for(let i=0;i<80;i++){
    let x = (i*97 - worldX*0.08) % (W+120);
    if(x < -20) x += W + 120;
    const y = 28 + (i*53) % Math.floor(H*.45);
    const r = (i%3)+0.7;
    ctx.globalAlpha = .35 + (i%5)*.1;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawTerrain(){
  const step = 18;
  let started = false;

  for(let x=-step;x<=W+step;x+=step){
    const gy = groundAtScreenX(x);

    if(gy === null){
      if(started){
        ctx.lineTo(x-step,H+80);
        ctx.closePath();
        fillGround();
        started = false;
      }
      continue;
    }

    if(!started){
      ctx.beginPath();
      ctx.moveTo(x,H+80);
      ctx.lineTo(x,gy);
      started = true;
    }else{
      ctx.lineTo(x,gy);
    }
  }

  if(started){
    ctx.lineTo(W+step,H+80);
    ctx.closePath();
    fillGround();
  }

  ctx.save();
  ctx.strokeStyle = "rgba(120,220,255,.85)";
  ctx.lineWidth = 3;
  ctx.shadowColor = "rgba(65,210,255,.65)";
  ctx.shadowBlur = 12;

  let drawing = false;
  ctx.beginPath();

  for(let x=-step;x<=W+step;x+=step){
    const gy = groundAtScreenX(x);
    if(gy === null){
      drawing = false;
      continue;
    }

    if(!drawing){
      ctx.moveTo(x,gy);
      drawing = true;
    }else{
      ctx.lineTo(x,gy);
    }
  }

  ctx.stroke();
  ctx.restore();
}

function fillGround(){
  const g = ctx.createLinearGradient(0,H*.55,0,H);
  g.addColorStop(0,"#14375c");
  g.addColorStop(1,"#07111f");
  ctx.fillStyle = g;
  ctx.fill();
}

function drawCoins(){
  for(const c of coins){
    const sx = c.x - worldX;
    if(sx < -80 || sx > W + 80) continue;

    const pulse = 1 + Math.sin((worldX+c.x)*.025)*.08;
    const size = c.r * 2 * pulse;

    ctx.save();
    ctx.translate(sx,c.y);
    ctx.rotate(Math.sin((worldX+c.x)*.02)*.15);

    const im = imgs[c.img];
    if(im && im.complete && im.naturalWidth > 0){
      ctx.drawImage(im,-size/2,-size/2,size,size);
    }else{
      ctx.fillStyle = "#ffd95c";
      ctx.beginPath();
      ctx.arc(0,0,c.r,0,Math.PI*2);
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawObstacles(){
  for(const o of obstacles){
    const sx = o.x - worldX;
    if(sx < -100 || sx > W+100) continue;

    const grad = ctx.createLinearGradient(sx,o.y,sx,o.y+o.h);
    grad.addColorStop(0,"#ff5f7d");
    grad.addColorStop(1,"#8e1b42");

    ctx.save();
    ctx.fillStyle = grad;
    ctx.shadowColor = "rgba(255,80,120,.55)";
    ctx.shadowBlur = 12;
    roundRect(ctx,sx,o.y,o.w,o.h,10);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,.25)";
    roundRect(ctx,sx+8,o.y+8,o.w-16,8,4);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(){
  const gy = groundAtScreenX(player.x + player.w/2);

  if(gy !== null){
    ctx.fillStyle = "rgba(0,0,0,.28)";
    ctx.beginPath();
    ctx.ellipse(player.x + 42, gy + 6, 34, 8, 0, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.save();

  const bob = player.grounded ? Math.sin(worldX*.045)*2 : 0;
  ctx.translate(player.x + player.w/2, player.y + player.h/2 + bob);
  ctx.scale(1, player.sliding ? .68 : 1);
  ctx.rotate(player.grounded ? Math.sin(worldX*.03)*.035 : player.vy*.00018);

  const im = imgs.player;
  if(im && im.complete && im.naturalWidth > 0){
    ctx.drawImage(im,-player.w/2,-player.h/2,player.w,player.h);
  }else{
    ctx.fillStyle = "#42d7ff";
    ctx.beginPath();
    ctx.arc(0,0,34,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(0,-3,17,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(2,-2,7,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const a = Math.max(0,p.life/p.max);
    ctx.save();
    ctx.globalAlpha = a;

    if(p.type === "dust") ctx.fillStyle = "#b9e8ff";
    else if(p.type === "spark") ctx.fillStyle = "#ffd95c";
    else ctx.fillStyle = "#fff1a8";

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function draw(){
  drawBackground();
  drawTerrain();
  drawCoins();
  drawObstacles();
  drawPlayer();
  drawParticles();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* =====================
   루프
===================== */
function loop(time){
  if(!running) return;

  if(!lastTime) lastTime = time;
  let dt = (time - lastTime) / 1000;
  lastTime = time;

  if(dt > 0.05) dt = 0.016;

  update(dt);
  draw();

  if(running){
    rafId = requestAnimationFrame(loop);
  }
}

/* =====================
   시작/종료
===================== */
function resetGame(){
  worldX = 0;
  speed = 360;
  score = 0;
  combo = 1;
  comboTimer = 0;

  coins = [];
  obstacles = [];
  particles = [];

  nextCoinX = 500;
  nextObstacleX = 950;

  player.x = 130;
  player.w = 82;
  player.h = 82;
  player.vy = 0;
  player.grounded = true;
  player.sliding = false;
  player.jumpCount = 0;
  player.slideTimer = 0;

  const gy = groundAtScreenX(player.x + player.w/2) || H*.76;
  player.y = gy - player.h;

  scoreEl.textContent = "SCORE 0";
  comboEl.classList.remove("on");
}

function startGame(){
  initSound();

  if(rafId) cancelAnimationFrame(rafId);

  resetGame();

  gameOvered = false;
  running = true;
  lastTime = 0;

  startScreen.style.display = "none";
  gameOverScreen.style.display = "none";

  rafId = requestAnimationFrame(loop);
}

function endGame(){
  if(gameOvered) return;

  gameOvered = true;
  running = false;

  if(rafId) cancelAnimationFrame(rafId);

  try{
    if(bgm) bgm.pause();
    playSfx(sfxGameover);
  }catch(e){}

  finalScoreEl.textContent = "SCORE " + Math.floor(score);
  gameOverScreen.style.display = "flex";
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("startBtn").addEventListener("pointerdown", e=>{
  e.preventDefault();
  startGame();
});

document.getElementById("restartBtn").addEventListener("click", startGame);
document.getElementById("restartBtn").addEventListener("pointerdown", e=>{
  e.preventDefault();
  startGame();
});

// 첫 화면도 배경은 보여주기
resetGame();
draw();
</script>
</body>
</html>
