<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MONSTARZ RUN</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050b18;
  touch-action: none;
  overscroll-behavior: none;
  font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
}

#gameWrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at 30% 20%, rgba(78, 190, 255, .18), transparent 30%),
    radial-gradient(circle at 80% 10%, rgba(255, 211, 95, .14), transparent 25%),
    linear-gradient(180deg, #061126, #081832 60%, #07111f);
}

canvas {
  width: 100vw;
  height: 100vh;
  display: block;
  background: transparent;
  touch-action: none;
}

#hud {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10;
  color: white;
  font-weight: 900;
  text-shadow: 0 2px 8px rgba(0,0,0,.55);
  pointer-events: none;
}

#score {
  font-size: 22px;
}

#combo {
  margin-top: 4px;
  font-size: 16px;
  color: #ffd95c;
  opacity: 0;
  transition: opacity .15s;
}

#combo.on {
  opacity: 1;
}

#startScreen,
#gameOverScreen {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(3, 8, 18, .72);
  color: white;
  text-align: center;
}

.panel {
  width: min(420px, 88vw);
  padding: 26px 22px;
  border-radius: 24px;
  background: rgba(10, 25, 48, .92);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 18px 60px rgba(0,0,0,.45);
}

.panel h1 {
  margin: 0 0 10px;
  font-size: 32px;
}

.panel p {
  margin: 8px 0;
  color: #cfe6ff;
  line-height: 1.5;
}

.panel button {
  margin-top: 16px;
  width: 100%;
  height: 48px;
  border: 0;
  border-radius: 16px;
  background: linear-gradient(135deg, #36d1ff, #7b5cff);
  color: white;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
}

#mobileControls {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 18px;
  z-index: 15;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
  pointer-events: none;
}

.ctrlBtn {
  width: 86px;
  height: 86px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.28);
  background: rgba(14, 33, 62, .72);
  color: white;
  font-size: 15px;
  font-weight: 900;
  backdrop-filter: blur(8px);
  pointer-events: auto;
  user-select: none;
}

@media (min-width: 900px) {
  #mobileControls {
    display: none;
  }
}
</style>
</head>

<body>
<div id="gameWrap">
  <canvas id="game"></canvas>
</div>

<div id="hud">
  <div id="score">SCORE 0</div>
  <div id="combo">COMBO x1</div>
</div>

<div id="startScreen">
  <div class="panel">
    <h1>MONSTARZ RUN</h1>
    <p>SPACE / 터치 : 점프</p>
    <p>↓ / 오른쪽 버튼 : 슬라이드</p>
    <p>별풍선을 먹고 콤보를 이어가라!</p>
    <button id="startBtn">게임 시작</button>
  </div>
</div>

<div id="gameOverScreen" style="display:none;">
  <div class="panel">
    <h1>GAME OVER</h1>
    <p id="finalScore">SCORE 0</p>
    <button onclick="location.reload()">다시 시작</button>
  </div>
</div>

<div id="mobileControls">
  <button class="ctrlBtn" id="jumpBtn">JUMP</button>
  <button class="ctrlBtn" id="slideBtn">SLIDE</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScoreEl = document.getElementById("finalScore");

let W = 0;
let H = 0;
let DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

/* =========================
   ASSETS
========================= */

const assets = {
  player: "assets/player_monstarz_clean.png",
  coin1: "assets/coin_blue.png",
  coin2: "assets/coin_orange.png",
  coin3: "assets/coin_pink.png",
  coin4: "assets/coin_purple.png",
  coin5: "assets/coin_yellow.png",
  bgm: "assets/bgm.mp3",
  jump: "assets/jump.wav",
  coin: "assets/coin.wav",
  hit: "assets/hit.wav",
  gameover: "assets/gameover.wav"
};

const img = {};
for (const [key, src] of Object.entries(assets)) {
  if (src.endsWith(".png")) {
    img[key] = new Image();
    img[key].src = src;
  }
}

const coinImgs = ["coin1", "coin2", "coin3", "coin4", "coin5"];

let bgm, sfxJump, sfxCoin, sfxHit, sfxGameover;

function initSound() {
  try {
    bgm = new Audio(assets.bgm);
    bgm.loop = true;
    bgm.volume = 0.35;

    sfxJump = new Audio(assets.jump);
    sfxCoin = new Audio(assets.coin);
    sfxHit = new Audio(assets.hit);
    sfxGameover = new Audio(assets.gameover);

    sfxJump.volume = 0.45;
    sfxCoin.volume = 0.65;
    sfxHit.volume = 0.55;
    sfxGameover.volume = 0.65;

    bgm.play().catch(() => {});
  } catch (e) {}
}

function playSfx(sound) {
  if (!sound) return;
  try {
    sound.currentTime = 0;
    sound.play().catch(() => {});
  } catch (e) {}
}

/* =========================
   GAME STATE
========================= */

let running = false;
let gameOvered = false;
let lastTime = 0;

let worldX = 0;
let speed = 360;        // px/sec 기준
let maxSpeed = 620;
let score = 0;
let combo = 1;
let comboTimer = 0;

let debugHitbox = false;

const player = {
  x: 130,
  y: 0,
  r: 33,
  w: 82,
  h: 82,
  vy: 0,
  grounded: false,
  sliding: false,
  slideTimer: 0,
  jumpCount: 0
};

const gravity = 1850;
const jumpPower = -720;

let coins = [];
let obstacles = [];
let particles = [];

let nextCoinX = 550;
let nextObstacleX = 900;

/* =========================
   TERRAIN
========================= */

function terrainY(wx) {
  const cycle = wx % 2600;

  if (cycle > 1180 && cycle < 1460) return null;
  if (cycle > 2150 && cycle < 2380) return null;

  let base = H * 0.76;

  if (cycle < 500) return base;
  if (cycle < 850) return base - (cycle - 500) * 0.18;
  if (cycle < 1180) return base - 63;
  if (cycle < 1750) return base - 25 + Math.sin(cycle * 0.015) * 18;
  if (cycle < 2150) return base + (cycle - 1750) * 0.09;
  return base + 36;
}

function groundAtScreenX(screenX) {
  return terrainY(worldX + screenX);
}

function drawTerrain() {
  ctx.beginPath();

  const step = 18;
  let started = false;

  for (let x = -step; x <= W + step; x += step) {
    const gy = groundAtScreenX(x);

    if (gy === null) {
      if (started) {
        ctx.lineTo(x - step, H + 80);
        ctx.closePath();
        fillGround();
        started = false;
      }
      continue;
    }

    if (!started) {
      ctx.beginPath();
      ctx.moveTo(x, H + 80);
      ctx.lineTo(x, gy);
      started = true;
    } else {
      ctx.lineTo(x, gy);
    }
  }

  if (started) {
    ctx.lineTo(W + step, H + 80);
    ctx.closePath();
    fillGround();
  }

  // 바닥 라인
  ctx.save();
  ctx.strokeStyle = "rgba(120,220,255,.8)";
  ctx.lineWidth = 3;
  ctx.shadowColor = "rgba(65,210,255,.65)";
  ctx.shadowBlur = 12;

  let drawing = false;
  ctx.beginPath();

  for (let x = -step; x <= W + step; x += step) {
    const gy = groundAtScreenX(x);
    if (gy === null) {
      drawing = false;
      continue;
    }
    if (!drawing) {
      ctx.moveTo(x, gy);
      drawing = true;
    } else {
      ctx.lineTo(x, gy);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function fillGround() {
  const g = ctx.createLinearGradient(0, H * .55, 0, H);
  g.addColorStop(0, "#14375c");
  g.addColorStop(1, "#07111f");
  ctx.fillStyle = g;
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,.07)";
  ctx.lineWidth = 1;
  ctx.stroke();
}

/* =========================
   SPAWN
========================= */

function isSafeGround(wx) {
  return terrainY(wx) !== null &&
         terrainY(wx + 90) !== null &&
         terrainY(wx - 90) !== null;
}

function spawnCoinLine(baseX) {
  const gy = terrainY(baseX);
  if (gy === null) return;

  const pattern = Math.random();

  for (let i = 0; i < 5; i++) {
    coins.push({
      x: baseX + i * 46,
      y: gy - 95 - (pattern > .5 ? Math.sin(i * .9) * 28 : 0),
      r: 17,
      img: coinImgs[Math.floor(Math.random() * coinImgs.length)],
      taken: false
    });
  }
}

function spawnObstacle(baseX) {
  if (!isSafeGround(baseX)) return;

  const gy = terrainY(baseX);
  const type = Math.random();

  if (type < .55) {
    obstacles.push({
      x: baseX,
      y: gy - 46,
      w: 42,
      h: 46,
      kind: "low"
    });
  } else {
    obstacles.push({
      x: baseX,
      y: gy - 92,
      w: 46,
      h: 46,
      kind: "air"
    });
  }
}

/* =========================
   INPUT
========================= */

function jump() {
  if (!running || gameOvered) return;

  if (player.grounded || player.jumpCount < 2) {
    player.vy = jumpPower;
    player.grounded = false;
    player.jumpCount++;
    player.sliding = false;
    spawnJumpEffect();
    playSfx(sfxJump);
  }
}

function slide(on) {
  if (!running || gameOvered) return;

  player.sliding = on && player.grounded;
  if (player.sliding) {
    player.slideTimer = 0.18;
    spawnSlideEffect();
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }

  if (e.code === "ArrowDown") {
    e.preventDefault();
    slide(true);
  }

  if (e.code === "KeyH") {
    debugHitbox = !debugHitbox;
  }
});

document.addEventListener("keyup", e => {
  if (e.code === "ArrowDown") {
    slide(false);
  }
});

const jumpBtn = document.getElementById("jumpBtn");
const slideBtn = document.getElementById("slideBtn");

jumpBtn.addEventListener("pointerdown", e => {
  e.preventDefault();
  jump();
});

slideBtn.addEventListener("pointerdown", e => {
  e.preventDefault();
  slide(true);
});

slideBtn.addEventListener("pointerup", e => {
  e.preventDefault();
  slide(false);
});

slideBtn.addEventListener("pointercancel", e => {
  e.preventDefault();
  slide(false);
});

canvas.addEventListener("pointerdown", e => {
  e.preventDefault();
  if (!running) return;
  jump();
});

/* =========================
   EFFECTS
========================= */

function spawnJumpEffect() {
  const gy = groundAtScreenX(player.x);
  const y = gy || player.y + player.h;

  for (let i = 0; i < 12; i++) {
    particles.push({
      x: player.x + 35 + Math.random() * 20,
      y,
      vx: -80 - Math.random() * 170,
      vy: -60 + Math.random() * 90,
      life: .35,
      max: .35,
      size: 4 + Math.random() * 6,
      type: "dust"
    });
  }
}

function spawnSlideEffect() {
  const gy = groundAtScreenX(player.x);
  const y = gy || player.y + player.h;

  for (let i = 0; i < 10; i++) {
    particles.push({
      x: player.x + 15 + Math.random() * 40,
      y: y - 6,
      vx: -120 - Math.random() * 220,
      vy: -40 + Math.random() * 70,
      life: .22,
      max: .22,
      size: 3 + Math.random() * 4,
      type: "spark"
    });
  }
}

function spawnCoinEffect(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x,
      y,
      vx: -80 + Math.random() * 160,
      vy: -160 + Math.random() * 120,
      life: .38,
      max: .38,
      size: 3 + Math.random() * 5,
      type: "coin"
    });
  }
}

/* =========================
   COLLISION
========================= */

function circleRectCollision(cx, cy, cr, rx, ry, rw, rh) {
  const nearestX = Math.max(rx, Math.min(cx, rx + rw));
  const nearestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearestX;
  const dy = cy - nearestY;
  return dx * dx + dy * dy < cr * cr;
}

function playerHitCircle() {
  const cx = player.x + player.w * .5;
  const cy = player.y + player.h * (player.sliding ? .64 : .5);
  const r = player.sliding ? 24 : 31;
  return { cx, cy, r };
}

/* =========================
   UPDATE
========================= */

function update(dt) {
  if (!running || gameOvered) return;

  // 모바일 프레임 튐 방지
  dt = Math.min(dt, 1 / 30);

  speed = Math.min(maxSpeed, speed + 3.5 * dt);
  worldX += speed * dt;

  score += dt * 18 * combo;
  scoreEl.textContent = "SCORE " + Math.floor(score);

  comboTimer -= dt;
  if (comboTimer <= 0) {
    combo = 1;
    comboEl.classList.remove("on");
  }

  // 지형 기준 플레이어 물리
  player.vy += gravity * dt;
  player.y += player.vy * dt;

  const gy = groundAtScreenX(player.x + player.w * .5);

  if (gy !== null && player.y + player.h >= gy) {
    player.y = gy - player.h;
    player.vy = 0;
    player.grounded = true;
    player.jumpCount = 0;
  } else {
    player.grounded = false;
  }

  if (player.y > H + 160) {
    endGame();
    return;
  }

  if (player.slideTimer > 0) {
    player.slideTimer -= dt;
    if (player.slideTimer <= 0 && player.sliding) {
      spawnSlideEffect();
      player.slideTimer = 0.18;
    }
  }

  // 스폰
  if (worldX + W + 250 > nextCoinX) {
    spawnCoinLine(nextCoinX);
    nextCoinX += 420 + Math.random() * 360;
  }

  if (worldX + W + 350 > nextObstacleX) {
    spawnObstacle(nextObstacleX);
    nextObstacleX += 680 + Math.random() * 520;
  }

  // 코인 충돌
  const hit = playerHitCircle();

  for (const c of coins) {
    if (c.taken) continue;

    const sx = c.x - worldX;
    const sy = c.y;

    const dx = hit.cx - sx;
    const dy = hit.cy - sy;
    if (dx * dx + dy * dy < (hit.r + c.r) * (hit.r + c.r)) {
      c.taken = true;
      combo++;
      comboTimer = 2.3;
      score += 80 * combo;
      comboEl.textContent = "COMBO x" + combo;
      comboEl.classList.add("on");
      spawnCoinEffect(sx, sy);
      playSfx(sfxCoin);
    }
  }

  // 장애물 충돌
  for (const o of obstacles) {
    const sx = o.x - worldX;
    if (sx < -120) continue;

    if (circleRectCollision(hit.cx, hit.cy, hit.r, sx, o.y, o.w, o.h)) {
      playSfx(sfxHit);
      endGame();
      return;
    }
  }

  // 오래된 오브젝트 제거
  coins = coins.filter(c => c.x - worldX > -160 && !c.taken);
  obstacles = obstacles.filter(o => o.x - worldX > -180);

  // 파티클
  for (const p of particles) {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 320 * dt;
  }
  particles = particles.filter(p => p.life > 0);
}

/* =========================
   DRAW
========================= */

function drawBackground() {
  ctx.clearRect(0, 0, W, H);

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#071630");
  sky.addColorStop(.58, "#0b2445");
  sky.addColorStop(1, "#07111f");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 별
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,.7)";
  for (let i = 0; i < 80; i++) {
    const x = (i * 97 - worldX * 0.08) % (W + 120);
    const y = 30 + (i * 53) % Math.floor(H * .45);
    const r = (i % 3) + .8;
    ctx.globalAlpha = .35 + (i % 5) * .1;
    ctx.beginPath();
    ctx.arc(x < -20 ? x + W + 120 : x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // 먼 배경 산
  ctx.save();
  ctx.fillStyle = "rgba(35, 94, 140, .22)";
  ctx.beginPath();
  ctx.moveTo(0, H * .62);
  for (let x = 0; x <= W + 80; x += 80) {
    const y = H * .58 + Math.sin((x + worldX * .08) * .01) * 25;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  ctx.save();

  const bob = player.grounded ? Math.sin(worldX * .045) * 2 : 0;
  const px = player.x;
  const py = player.y + bob;
  const scaleY = player.sliding ? .68 : 1;

  // 그림자
  const gy = groundAtScreenX(player.x + player.w * .5);
  if (gy !== null) {
    ctx.fillStyle = "rgba(0,0,0,.28)";
    ctx.beginPath();
    ctx.ellipse(player.x + 42, gy + 6, 34, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.translate(px + player.w / 2, py + player.h / 2);
  ctx.scale(1, scaleY);
  ctx.rotate(player.grounded ? Math.sin(worldX * .03) * .035 : player.vy * .00018);

  if (img.player && img.player.complete) {
    ctx.drawImage(img.player, -player.w / 2, -player.h / 2, player.w, player.h);
  } else {
    ctx.fillStyle = "#40d7ff";
    ctx.beginPath();
    ctx.arc(0, 0, 34, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  if (debugHitbox) {
    const h = playerHitCircle();
    ctx.save();
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(h.cx, h.cy, h.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawCoins() {
  for (const c of coins) {
    const sx = c.x - worldX;
    if (sx < -80 || sx > W + 80) continue;

    const pulse = 1 + Math.sin((worldX + c.x) * .025) * .08;
    const size = c.r * 2 * pulse;

    ctx.save();
    ctx.translate(sx, c.y);
    ctx.rotate(Math.sin((worldX + c.x) * .02) * .15);

    const im = img[c.img];
    if (im && im.complete) {
      ctx.drawImage(im, -size / 2, -size / 2, size, size);
    } else {
      ctx.fillStyle = "#ffd95c";
      ctx.beginPath();
      ctx.arc(0, 0, c.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    const sx = o.x - worldX;
    if (sx < -100 || sx > W + 100) continue;

    ctx.save();

    const grad = ctx.createLinearGradient(sx, o.y, sx, o.y + o.h);
    grad.addColorStop(0, "#ff5f7d");
    grad.addColorStop(1, "#8e1b42");

    ctx.fillStyle = grad;
    ctx.shadowColor = "rgba(255,80,120,.55)";
    ctx.shadowBlur = 12;

    roundRect(ctx, sx, o.y, o.w, o.h, 10);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,.25)";
    roundRect(ctx, sx + 8, o.y + 8, o.w - 16, 8, 4);
    ctx.fill();

    ctx.restore();
  }
}

function drawParticles(dt) {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.max);
    ctx.save();
    ctx.globalAlpha = alpha;

    if (p.type === "dust") ctx.fillStyle = "#b9e8ff";
    else if (p.type === "spark") ctx.fillStyle = "#ffd95c";
    else ctx.fillStyle = "#fff1a8";

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function draw() {
  drawBackground();
  drawTerrain();
  drawCoins();
  drawObstacles();
  drawPlayer();
  drawParticles();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =========================
   LOOP
========================= */

function loop(time) {
  if (!lastTime) lastTime = time;

  let dt = (time - lastTime) / 1000;
  lastTime = time;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

/* =========================
   START / END
========================= */

function startGame() {
  initSound();

  running = true;
  gameOvered = false;
  startScreen.style.display = "none";

  const firstGround = groundAtScreenX(player.x + player.w * .5) || H * .76;
  player.y = firstGround - player.h;
  player.vy = 0;
  player.grounded = true;

  lastTime = performance.now();
}

function endGame() {
  if (gameOvered) return;

  gameOvered = true;
  running = false;

  try {
    if (bgm) bgm.pause();
    playSfx(sfxGameover);
  } catch (e) {}

  finalScoreEl.textContent = "SCORE " + Math.floor(score);
  gameOverScreen.style.display = "flex";
}

document.getElementById("startBtn").addEventListener("click", startGame);
</script>
